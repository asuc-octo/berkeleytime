# path in host machine. should depend on environment and be different for each mongo pod.
hostPath: /data/prod/db

mongodb:
  commonLabels:
    env: prod

  architecture: replicaset
  arbiter:
    enabled: false
  replicaCount: 1

  auth:
    enabled: false

  # MongoDB 8.0 removed storage.journal.enabled; custom config omits it to avoid "Unrecognized option"
  configuration: |
    storage:
      dbPath: /bitnami/mongodb/data/db
      directoryPerDB: false
    systemLog:
      destination: file
      path: /opt/bitnami/mongodb/logs/mongodb.log
      logAppend: true
    net:
      port: 27017
      bindIp: 0.0.0.0
    processManagement:
      pidFilePath: /opt/bitnami/mongodb/tmp/mongodb.pid
    replication:
      replSetName: rs0

  persistence:
    storageClass: manual

    # path in pod. should be same for all mongo pods.
    size: 10Gi

  # required for persistence. without, data is not saved across pod restarts.
  volumePermissions:
    enabled: true
