apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bt-app.backendName" . }}
  labels:
    {{- include "bt-app.backendLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "bt-app.backendLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bt-app.backendLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backend
          image: {{ printf "%s/%s:%s" .Values.backend.image.registry .Values.backend.image.repository ( toString .Values.backend.image.tag ) }}
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.backend.port }}
            - containerPort: {{ .Values.backend.cacheWarmingPort }}
          envFrom:
            - configMapRef:
                name: {{ include "bt-app.backendName" . }}-env
            - secretRef:
                name: {{ include "bt-app.backendName" . }}-secret
          resources:
            requests:
              ephemeral-storage: "500Mi"
            limits:
              ephemeral-storage: "2Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 3

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bt-app.backendName" . }}-env
  labels:
    {{- include "bt-app.backendLabels" . | nindent 4 }}
data:
  PORT: {{ .Values.backend.port | quote }}
  CACHE_WARMING_PORT: {{ .Values.backend.cacheWarmingPort | quote }}
  URL: "http://localhost:5001"
  BACKEND_PATH: {{ .Values.backend.path }}
  BACKEND_PUBLIC_URL: {{ printf "https://%s%s" .Values.host .Values.backend.path | quote }}
  GRAPHQL_PATH: "/graphql"
  NODE_ENV: {{ .Values.nodeEnv }}
  MONGODB_URI: {{ .Values.mongoUri }}
  REDIS_URI: {{ .Values.redisUri }}
  SIS_CLASS_APP_ID: "_" # TODO: remove from backend
  SIS_CLASS_APP_KEY: "_"
  SIS_COURSE_APP_ID: "_"
  SIS_COURSE_APP_KEY: "_"
  SIS_TERM_APP_ID: "_"
  SIS_TERM_APP_KEY: "_"

---

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
  name: {{ include "bt-app.backendName" .}}-secret
  labels:
    {{- include "bt-app.backendLabels" . | nindent 4 }}
spec:
  encryptedData:
    CLOUDFLARE_API_TOKEN: 
    CLOUDFLARE_ZONE_ID: 
    GOOGLE_CLIENT_ID: 
    GOOGLE_CLIENT_SECRET: 
    S3_ACCESS_KEY_ID: 
    S3_ENDPOINT: 
    S3_IMAGES_ACCESS_URL: 
    S3_SECRET_ACCESS_KEY: 
    SESSION_SECRET: 
    CLOUDFLARE_ACCESS_API_TOKEN: 
    CLOUDFLARE_ACCOUNT_ID: 
    CLOUDFLARE_STAFF_GROUP_ID: 
  template:
    metadata:
      annotations:
        sealedsecrets.bitnami.com/namespace-wide: "true"
      name: {{ include "bt-app.backendName" .}}-secret
      labels:
        {{- include "bt-app.backendLabels" . | nindent 8 }}

---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "bt-app.backendName" . }}-svc
  labels:
    {{- include "bt-app.backendLabels" . | nindent 4 }}
spec:
  selector:
    {{- include "bt-app.backendLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.port }}
      targetPort: {{ .Values.backend.port }}
    - name: cache-warming
      protocol: TCP
      port: {{ .Values.backend.cacheWarmingPort }}
      targetPort: {{ .Values.backend.cacheWarmingPort }}
